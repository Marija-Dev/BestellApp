<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bestell App</title>

    <script src="./scripts/db.js"></script>
    <script src="./scripts/template.js"></script>
    <script src="./script.js" defer></script>

    <link rel="stylesheet" href="./styles/assets.css">
    <link rel="stylesheet" href="./styles/basket.css">
    <link rel="stylesheet" href="./styles/standard.css">
    <link rel="stylesheet" href="./assets/fonts/fonts.css">
    <link rel="stylesheet" href="./style.css">

</head>

<body onload="init()">
    <header>
        <div class="header-content">
            <img src="/assets/icons/Logo.svg" alt="Bestell App">

            <div class="burger-menu">
                <div class="burger-menu-icon"></div>
                <div class="burger-menu-icon"></div>
                <div class="burger-menu-icon"></div>
            </div>
        </div>

        <section class="headline-container">
            <img class="hero-img" src="./assets/img/hero.jpg" alt="">

            <img class="burger-logo" src="./assets/icons/burger-logo.png" alt="">

            <div class="heading-container">
                <div class="heading">
                    <h1>Burger</h1>
                    <h2>House</h2>
                </div>
                <div class="rating-img-container">
                    <img class="rating-img" src="./assets/icons/rating.svg" alt="">
                </div>
            </div>

            <p class="heading-text">The best of Burgers, Pizza, and Greens, all in one great place.</p>

            <div class="menu-links">
                <a class="menu-single-link" href="#101">Burger</a>
                <a class="menu-single-link" href="#202">Pizza</a>
                <a class="menu-single-link" href="#303">Salad</a>
            </div>
        </section>
    </header>

    <main>
        <article class="content-container">
            <section class="menu-container">
                <section class="burger-titles-fullwidth">
                    <div class="category-titles-content">
                        <img class="burger-icon" src="./assets/icons/burger-icon.png" alt="">
                        <h3 id="101" class="burger-headline">Burger & Sandwiches</h3>
                    </div>
                </section>

                <div id="allBurgers" class="menu-content">

                </div>

                <section class="pizza-titles-fullwidth">
                    <div class="category-titles-content">
                        <img class="pizza-icon" src="./assets/icons/pizza-icon.png" alt="">
                        <h3 id="202" class="pizza-headline">Pizza</h3>
                    </div>
                </section>

                <div id="allPizza" class="menu-content">

                </div>

                <section class="salad-titles-fullwidth">
                    <div class="category-titles-content">
                        <img class="salad-icon" src="./assets/icons/salad-icon.png" alt="">
                        <h3 id="303" class="salad-headline">Salad</h3>
                    </div>
                </section>

                <div id="allSalad" class="menu-content">

                </div>

            </section>

            <section class="basket-container">
                <div id="myBasket" class="basket">
                    <h5>Your Basket</h5>
                    <div id="addedBasketMenu" class="single-menu-container">

                    </div>

                    <div id="checkOutContainer">

                    </div>
                </div>
            </section>

            <section class="basket-mobile-container">
                <div class="basket-mobile">
                    <img class="basket-mobile-img" src="./assets/icons/nav-home.png" alt="">
                    <img class="basket-mobile-img" src="./assets/icons/nav-profile.png" alt="">
                    <img class="basket-mobile-img" src="./assets/icons/nav-logo.png" alt="">
                    <img class="basket-mobile-img" src="./assets/icons/nav-cart.png" alt="">
                </div>
            </section>
        </article>

        <dialog id="myDialog">

        </dialog>
    </main>

    <footer>
        <p>© 2026 BurgerHouse</p>
        <p>Imprint</p>
        <p>Cookie Preferences</p>
    </footer>
</body>

</html>
